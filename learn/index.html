<body id="top">
  <header id="banner">
    <h1><a href="/" translate="no" title="TürKingo">TürKingo</a></h1>
    <nav>
      <a class="navbar-item" href="/">Home</a>
      <a class="navbar-item" href="/scoreboard/">Scores</a>
      <a class="navbar-item" id="navbar-curr-page">Learn</a>
      <a class="navbar-item" href="/about/">About</a>
    </nav>
  </header>

  <main>
    <article>
      <h1>Learn</h1>

      <div class="search-container">
        <input type="text" maxlength="40" placeholder="Search..." autocomplete="off" oninput="search()" id="search-input">
      </div>

      <p id="no-result-p" style="display: none">No results.</p>

      <div class="section">
        <h3>Words</h3>
        <div class="list-wrapper">
          <table id="list-words">
            <thead><tr><th>English</th><th>Turkish</th></tr></thead>
            <tbody class="list" id="list-words-body"></tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <h3>Phrases</h3>
        <div class="list-wrapper">
          <table id="list-phrases">
            <thead><tr><th>English</th><th>Turkish</th></tr></thead>
            <tbody class="list" id="list-phrases-body"></tbody>
          </table>
        </div>
      </div>

      <div class="section">
        <h3>Sentences</h3>
        <div class="list-wrapper">
          <table id="list-sentences">
            <thead><tr><th>English</th><th>Turkish</th></tr></thead>
            <tbody class="list" id="list-sentences-body"></tbody>
          </table>
        </div>
      </div>
    </article>
  </main>

  <footer>
    <hr>
